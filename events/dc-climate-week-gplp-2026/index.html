];

// columns: 0=photo, 1=name, 2=about, 3=li_url, 4=badge, 5=fallback_svg

let sortCol = 1;
let sortDir = 1;
let filtered = [...DATA];

function typeBadge(t) {
  const c = TYPE_COLORS[t] || '#6b7280';
  return `<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${t}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  let html = '';
  for (let i = 0; i < filtered.length; i++) {
    const r = filtered[i];
    const [photo, name, about, li_url, badge, fallback] = r;
    const hasLi = li_url && li_url.length > 0;
    const aboutId = 'ab' + i;

    html += `<tr>
      <td class="photo-cell"><div class="photo-wrap"><img src="${photo}" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='${fallback}'" alt="${name}"></div></td>
      <td class="li-cell"><a class="li-link${hasLi ? '' : ' no-url'}" href="${li_url || '#'}" target="_blank" rel="noopener">${LI_SVG}</a></td>
      <td class="name-cell">${name}</td>
      <td class="about-cell"><div class="about-text" id="${aboutId}">${about}</div>${about && about.length > 100 ? `<button class="expand-btn" onclick="toggleAbout('${aboutId}', this)">Show more</button>` : ''}</td>
      <td>${typeBadge(badge)}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
  document.getElementById('count-label').textContent = filtered.length + ' of ' + DATA.length;
}

function toggleAbout(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'Show less' : 'Show more';
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const t = document.getElementById('type-filter').value;
  filtered = DATA.filter(r => {
    const matchQ = !q || (r[1]+' '+r[2]).toLowerCase().includes(q);
    const matchT = !t || r[4] === t;
    return matchQ && matchT;
  });
  sortFiltered();
  renderTable();
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('type-filter').value = '';
  applyFilters();
}

function sortTable(col) {
  const ths = document.querySelectorAll('thead th');
  ths.forEach(th => th.classList.remove('sorted-asc','sorted-desc'));
  if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }
  const thIdx = col === 1 ? 2 : col === 2 ? 3 : col === 4 ? 4 : col;
  ths[thIdx] && ths[thIdx].classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
  sortFiltered();
  renderTable();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    const av = (a[sortCol] || '').toLowerCase();
    const bv = (b[sortCol] || '').toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

sortFiltered();
renderTable();
</script>
