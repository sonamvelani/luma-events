function avatarUrl(n){var p=n.split(/s+/).filter(Boolean);var i=p.slice(0,2).map(function(w){return w[0].toUpperCase();}).join('+');return 'https://ui-avatars.com/api/?size=80&background=4A9B8E&color=fff&bold=true&name='+i;}
function handleImgError(img){img.onerror=null;img.src=avatarUrl(img.alt||'');}

function renderTable(rows){var tbody=document.getElementById('tbody');tbody.innerHTML='';rows.forEach(function(row,i){var photo=row[0],name=row[1],li=row[2],status=row[3],type=row[4],about=row[5];if(i>0&&i%10===0){var div=document.createElement('tr');div.className='batch-divider';div.innerHTML='<td colspan="6">Batch '+(Math.floor(i/10)+1)+' Â· rows '+(i+1)+'â'+Math.min(i+10,rows.length)+'</td>';tbody.appendChild(div);}var imgSrc=photo||avatarUrl(name);var aboutHtml=about&&about.length>100?'<span class="about-short">'+about.substring(0,100)+'â¦<span class="about-toggle" onclick="toggleAbout(this)"> more</span></span><span class="about-full" style="display:none">'+about+'<span class="about-toggle" onclick="toggleAbout(this)"> less</span></span>':'<span>'+(about||'')+'</span>';var tr=document.createElement('tr');tr.innerHTML='<td class="photo-cell"><img src="'+imgSrc+'" alt="'+name+'" onerror="handleImgError(this)"></td><td class="li-cell"><a href="'+(li||'#')+'" target="_blank" rel="noopener" class="li-link'+(li?'':' no-url')+'" title="'+name+' on LinkedIn">'+LI_SVG+'</a></td><td class="name-cell">'+name+'</td><td class="about-cell">'+aboutHtml+'</td><td><span class="pill pill-'+(STATUS_CLASS[status]||'unknown')+'">'+status+'</span></td><td><span class="pill pill-'+(TYPE_CLASS[type]||'unknown')+'">'+type+'</span></td>';tbody.appendChild(tr);});document.getElementById('count').textContent=rows.length+' shown';renderBatchBtns(rows);}
function toggleAbout(el){var td=el.closest('td');var s=td.querySelector('.about-short');var f=td.querySelector('.about-full');if(s&&s.contains(el)){s.style.display='none';if(f)f.style.display='inline';}else{if(f)f.style.display='none';if(s)s.style.display='inline';}}
function renderBatchBtns(rows){var c=document.getElementById('batch-btns');c.innerHTML='';var urls=rows.map(function(r){return r[2];}).filter(Boolean);for(var i=0;i<urls.length;i+=10){(function(batch,n){var btn=document.createElement('button');btn.className='batch-btn';btn.textContent='Open LinkedIn Batch '+n+' ('+batch.length+')';btn.onclick=function(){var s=batch.map(function(u){return 'window.open('+JSON.stringify(u)+',"_blank");';}).join('');var p='<html><body><scr'+'ipt>window.onload=function(){'+s+'window.close();}</scr'+'ipt><p style="font-family:sans-serif;padding:20px">Opening '+batch.length+' tabsâ¦</p></body></html>';var b=new Blob([p],{type:'text/html'});window.open(URL.createObjectURL(b),'_blank');};c.appendChild(btn);})(urls.slice(i,i+10),Math.floor(i/10)+1);}}
