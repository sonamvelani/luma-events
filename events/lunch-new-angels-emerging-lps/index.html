};

var LI_SVG = "<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"#0a66c2\"><path d=\"M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z\"/></svg>";

var filtered = DATA.slice();
var sortCol = 4, sortDir = 1;

function applyFilters() {
  var q = document.getElementById('search').value.toLowerCase();
  var t = document.getElementById('type-filter').value;
  var s = document.getElementById('status-filter').value;
  filtered = DATA.filter(function(r) {
    var matchQ = !q || (r[1]+r[5]+r[6]+r[7]).toLowerCase().includes(q);
    var matchT = !t || r[4] === t;
    var matchS = !s || r[3] === s;
    return matchQ && matchT && matchS;
  });
  filtered.sort(function(a,b) {
    var av = a[sortCol]||'', bv = b[sortCol]||'';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  renderTable();
  renderBatchBtns();
}

function sortTable(col) {
  if (sortCol === col) sortDir = -sortDir; else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(function(th,i) {
    th.className = '';
    if (i === col) th.className = sortDir === 1 ? 'sort-asc' : 'sort-desc';
  });
  applyFilters();
}

function renderTable() {
  var tb = document.getElementById('tbody');
  var html = '';
  var batchSize = 10;
  filtered.forEach(function(r, i) {
    var photo = r[0], name = r[1], li = r[2], status = r[3], type = r[4], about = r[5], title = r[6], company = r[7];
    if (i % batchSize === 0) {
      var batchNum = Math.floor(i/batchSize)+1;
      var start = i+1, end = Math.min(i+batchSize, filtered.length);
      html += '<tr class="batch-divider"><td colspan="8">Batch ' + batchNum + ' · rows ' + start + '–' + end + '</td></tr>';
    }
    var photoHtml = photo ? '<img src="'+photo+'" alt="'+name+'" onerror="this.style.display=\'none\'">' : '<div class="photo-placeholder"></div>';
    var liHtml = li ? '<a class="li-link" href="'+li+'" target="_blank" rel="noopener">'+LI_SVG+'</a>' : '<span class="li-link no-url">'+LI_SVG+'</span>';
    var shortAbout = about.length > 100 ? about.substring(0,100) : about;
    var aboutHtml = about.length > 100
      ? '<span class="about-short">'+shortAbout+'</span><span class="about-full" style="display:none">'+about+'</span><span class="about-toggle" onclick="toggleAbout(this)">more</span>'
      : about;
    html += '<tr>';
    html += '<td class="photo-cell">'+photoHtml+'</td>';
    html += '<td class="li-cell">'+liHtml+'</td>';
    html += '<td class="name-cell">'+name+'</td>';
    html += '<td class="title-cell">'+title+'</td>';
    html += '<td class="company-cell">'+company+'</td>';
    html += '<td class="about-cell">'+aboutHtml+'</td>';
    html += '<td><span class="pill '+(STATUS_CSS[status]||'pill-na')+'">'+status+'</span></td>';
    html += '<td><span class="pill '+(TYPE_CSS[type]||'pill-unknown')+'">'+type+'</span></td>';
    html += '</tr>';
  });
  tb.innerHTML = html;
  document.getElementById('count').textContent = filtered.length + ' of ' + DATA.length + ' shown';
}

function toggleAbout(el) {
  var cell = el.parentElement;
  var short = cell.querySelector('.about-short');
  var full = cell.querySelector('.about-full');
  if (full.style.display === 'none') {
    short.style.display = 'none';
    full.style.display = '';
    el.textContent = 'less';
  } else {
    short.style.display = '';
    full.style.display = 'none';
    el.textContent = 'more';
  }
}

function renderBatchBtns() {
  var batchSize = 10;
  var row = document.getElementById('batch-btns');
  row.innerHTML = '';
  for (var i = 0; i < filtered.length; i += batchSize) {
    var batch = filtered.slice(i, i+batchSize);
    var urls = batch.map(function(r) { return r[2]; }).filter(Boolean);
    if (!urls.length) continue;
    var batchNum = Math.floor(i/batchSize)+1;
    var btn = document.createElement('button');
    btn.className = 'batch-btn';
    btn.textContent = 'Open Batch ' + batchNum + ' (' + urls.length + ')';
    btn.onclick = (function(u) {
      return function() {
        var script = u.map(function(url) { return 'window.open('+JSON.stringify(url)+',"_blank");'; }).join('');
        var page = '<html><body><script>window.onload=function(){'+script+'window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening '+u.length+' tabs...</p></body></html>';
        var blob = new Blob([page], {type:'text/html'});
        window.open(URL.createObjectURL(blob),'_blank');
      };
    })(urls);
    row.appendChild(btn);
  }
}

applyFilters();
