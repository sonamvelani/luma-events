let sortCol = 9;
let sortDir = 1;
let filtered = [...DATA];

function typeDot(t) {
  const color = TYPE_DOTS[t] || '#9ca3af';
  return `<span class="type-tag"><span class="type-dot" style="background:${color}"></span>${t}</span>`;
}

function statusTag(s) {
  const cls = s === 'Confirmed' ? 'confirmed' : s === 'Guessed' ? 'guessed' : '';
  return `<span class="status-tag ${cls}">${s}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  let html = '';

  for (let i = 0; i < filtered.length; i++) {
    const r = filtered[i];
    const [photo, name, title, company, li_url, session, session_time, session_desc, role, type, status, about, bio] = r;

    if (i % 10 === 0) {
      const batchEnd = Math.min(i + 10, filtered.length);
      const batchUrls = filtered.slice(i, i + 10).map(x => x[4]).filter(u => u);
      const batchJson = JSON.stringify(batchUrls);
      html += `<tr class="batch-header"><td colspan="8">
        <div class="batch-inner">
          <span>Rows ${i+1}–${batchEnd}</span>
          <button class="batch-btn" onclick="openBatch(${batchJson})">Open ${batchUrls.length} LinkedIn tabs</button>
        </div>
      </td></tr>`;
    }

    const displayText = bio || about || '';
    const isLong = displayText.length > 250;
    const aboutHtml = isLong
      ? `<div class="about-text">${displayText}</div><button class="expand-btn" onclick="toggleAbout(this)">Show more</button>`
      : `<div class="about-text expanded">${displayText}</div>`;

    html += `<tr>
      <td class="photo-cell">
        <div class="photo-wrap">
          <img src="${photo}" alt="${name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
          <div class="photo-placeholder" style="display:none">◯</div>
        </div>
      </td>
      <td class="li-cell">
        <a class="li-link ${li_url ? '' : 'no-url'}" href="${li_url || '#'}" target="_blank" title="LinkedIn">${LI_SVG}</a>
      </td>
      <td class="name-cell">
        <div class="name">${name}</div>
        <div class="title-line">${title}</div>
        <div class="company-line">${company}</div>
      </td>
      <td class="session-cell">
        <div class="session-name">${session}</div>
        <div class="session-sub">${session_time} · ${role}</div>
      </td>
      <td class="about-cell">${aboutHtml}</td>
      <td class="type-cell">${typeDot(type)}</td>
      <td>${statusTag(status)}</td>
    </tr>`;
  }

  tbody.innerHTML = html;
  document.getElementById('count-label').textContent = `${filtered.length} of ${DATA.length}`;
}

function toggleAbout(btn) {
  const div = btn.previousElementSibling;
  const expanded = div.classList.toggle('expanded');
  btn.textContent = expanded ? 'Show less' : 'Show more';
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const typeFilter = document.getElementById('type-filter').value;
  const sessionFilter = document.getElementById('session-filter').value;
  const statusFilter = document.getElementById('status-filter').value;

  filtered = DATA.filter(r => {
    const [photo, name, title, company, li_url, session, , , role, type, status, about, bio] = r;
    if (search && !name.toLowerCase().includes(search) && !company.toLowerCase().includes(search) && !(about || '').toLowerCase().includes(search) && !(bio || '').toLowerCase().includes(search)) return false;
    if (typeFilter && type !== typeFilter) return false;
    if (sessionFilter && session !== sessionFilter) return false;
    if (statusFilter && status !== statusFilter) return false;
    return true;
  });

  sortFiltered();
  renderTable();
}

function sortTable(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  sortFiltered();
  renderTable();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    const av = a[sortCol] || '';
    const bv = b[sortCol] || '';
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('type-filter').value = '';
  document.getElementById('session-filter').value = '';
  document.getElementById('status-filter').value = '';
  filtered = [...DATA];
  sortFiltered();
  renderTable();
}

function openBatch(urls) {
  const script = urls.map(u => `window.open(${JSON.stringify(u)},'_blank');`).join('');
  const page = `<html><body><script>window.onload=function(){${script}window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ${urls.length} LinkedIn tabs…</p></body></html>`;
  const blob = new Blob([page], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank');
}

// Default sort: type order then name
const TYPE_ORDER = { "VC": 0, "LP": 1, "Impact Investor": 2, "Founder/Operator": 3, "Corporate": 4, "Consultant": 5, "NGO/Policy": 6, "Government": 7, "Research": 8 };
filtered.sort((a, b) => {
  const ta = TYPE_ORDER[a[9]] ?? 99;
  const tb = TYPE_ORDER[b[9]] ?? 99;
  if (ta !== tb) return ta - tb;
  return a[1].localeCompare(b[1]);
});

renderTable();
</script>
