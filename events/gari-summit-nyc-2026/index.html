// columns: 0=photo, 1=name, 2=title, 3=company, 4=linkedin_url, 5=session, 6=session_time, 7=session_desc, 8=role, 9=type, 10=status, 11=about_combined, 12=bio

let sortCol = 9;
let sortDir = 1;
let filtered = [...DATA];

function typeBadge(t) {
  const c = TYPE_COLORS[t] || '#6b7280';
  return `<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${t}</span>`;
}

function statusBadge(s) {
  const c = STATUS_COLORS[s] || '#9ca3af';
  return `<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${s}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  let html = '';

  for (let i = 0; i < filtered.length; i++) {
    const r = filtered[i];
    const [photo, name, title, company, li_url, session, session_time, session_desc, role, type, status, about, bio] = r;

    // Batch header every 10 rows
    if (i % 10 === 0) {
      const batchNum = Math.floor(i/10) + 1;
      const batchEnd = Math.min(i+10, filtered.length);
      const batchUrls = filtered.slice(i, i+10).map(x => x[4]).filter(u => u);
      const batchUrlsJson = JSON.stringify(batchUrls);
      html += `<tr class="batch-header"><td colspan="8">
        <span>Batch ${batchNum} · rows ${i+1}–${batchEnd}</span>
        <button class="batch-btn" onclick="openBatch(${batchUrlsJson})">Open ${batchUrls.length} LinkedIn tabs</button>
        <span class="tip">Allow popups</span>
      </td></tr>`;
    }

    const aboutText = about || bio || '';
    const isLong = aboutText.length > 300;
    const aboutHtml = isLong
      ? `<div class="about-text">\${aboutText}</div><button class="expand-btn" onclick="toggleAbout(this)">more ↓</button>`
      : `<div class="about-text expanded">\${aboutText}</div>`;

    html += `<tr>
      <td class="photo-cell">
        <div class="photo-wrap">
          <img src="${photo}" alt="${name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
          <div class="photo-placeholder" style="display:none">👤</div>
        </div>
      </td>
      <td class="li-cell">
        <a class="li-link ${li_url ? '' : 'no-url'}" href="${li_url || '#'}" target="_blank" title="${name} on LinkedIn">${LI_SVG}</a>
      </td>
      <td class="name-cell">
        <div class="name">${name}</div>
        <div class="title">${title}</div>
        <div class="title" style="color:#475569">${company}</div>
      </td>
      <td>${company}</td>
      <td class="session-cell">
        <div class="session-name">${session}</div>
        <div class="session-time">${session_time}</div>
        <div class="session-role">${role}</div>
      </td>
      <td class="about-cell">${aboutHtml}</td>
      <td>${typeBadge(type)}</td>
      <td>${statusBadge(status)}</td>
    </tr>`;
  }

  tbody.innerHTML = html;
  document.getElementById('count-label').textContent = filtered.length + ' of ' + DATA.length;
}

function toggleAbout(btn) {
  const div = btn.previousElementSibling;
  const expanded = div.classList.toggle('expanded');
  btn.textContent = expanded ? 'less ↑' : 'more ↓';
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const typeFilter = document.getElementById('type-filter').value;
  const sessionFilter = document.getElementById('session-filter').value;
  const statusFilter = document.getElementById('status-filter').value;

  filtered = DATA.filter(r => {
    const [photo, name, title, company, li_url, session, session_time, session_desc, role, type, status, about, bio] = r;
    if (search && !name.toLowerCase().includes(search) && !company.toLowerCase().includes(search) && !about.toLowerCase().includes(search)) return false;
    if (typeFilter && type !== typeFilter) return false;
    if (sessionFilter && session !== sessionFilter) return false;
    if (statusFilter && status !== statusFilter) return false;
    return true;
  });

  sortFiltered();
  renderTable();
}

function sortTable(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach((th, i) => {
    th.classList.remove('sorted-asc', 'sorted-desc');
  });
  sortFiltered();
  renderTable();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    const av = a[sortCol] || '';
    const bv = b[sortCol] || '';
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('type-filter').value = '';
  document.getElementById('session-filter').value = '';
  document.getElementById('status-filter').value = '';
  applyFilters();
}

function openBatch(urls) {
  const script = urls.map(u => `window.open(${JSON.stringify(u)},'_blank');`).join('');
  const page = `<html><body><script>window.onload=function(){${script}window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ${urls.length} LinkedIn tabs…</p></body></html>`;
  const blob = new Blob([page], {type:'text/html'});
  window.open(URL.createObjectURL(blob), '_blank');
}

// Default sort: Type then Name
filtered.sort((a, b) => {
  const typeOrder = {"VC": 0, "LP": 1, "Impact Investor": 2, "Founder/Operator": 3, "Corporate": 4, "Consultant": 5, "NGO/Policy": 6, "Government": 7, "Research": 8, "Unknown": 9};
  const ta = typeOrder[a[9]] ?? 99;
  const tb = typeOrder[b[9]] ?? 99;
  if (ta !== tb) return ta - tb;
  return a[1].localeCompare(b[1]);
});

renderTable();
</script>
</body>
