async function patchPerson(pid, patch) {

    const r = await fetch(`${SUPABASE_URL}/rest/v1/people?id=eq.${pid}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,

      body: JSON.stringify(patch)

    else { setSyncDot('error'); }
  } catch(e) { setSyncDot('error'); }
}

function cycleAction(pid) {

  saveState(pid);
  patchPerson(pid, { met: s.met, not_relevant: s.not_relevant });
  render();
}

function mkSvg(name) {
  const parts = name.trim().split(/\s+/);
  const ini = parts.length >= 2 ? (parts[0][0]+parts[parts.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
  const palette = ['#2c4a38','#3d5c46','#1e4d30','#5a7a4a','#2a5038','#3a6b48','#1a3d28','#4a6040','#2e5540','#224030'];
  let h = 0; for (const c of name) h = (h*31+c.charCodeAt(0))|0;
  const col = palette[Math.abs(h)%palette.length];
  return "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='80' height='80' rx='40' fill='" + col + "'/><text x='40' y='52' text-anchor='middle' font-family='Arial,sans-serif' font-size='28' font-weight='600' fill='white'>" + ini + "</text></svg>";
}

const liSvg = (color) => `<svg width="15" height="15" viewBox="0 0 24 24" fill="${color}"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`;

function liIcon(linkedin, status) {
  if (!linkedin) return `<span class="li-badge" style="opacity:.2">${liSvg('#9dbfaa')}</span>`;
  const color = status === 'Verified' ? '#0a66c2' : '#9dbfaa';
  return `<a href="${linkedin}" target="_blank" class="li-link li-badge">${liSvg(color)}</a>`;
}

function titleLevel(title) {
  if (!title) return 'junior';
  const t = title.toLowerCase();
  const senior = ['founder','co-founder','partner','director','vp','vice president','chief','president','head of','principal','managing','cto','ceo','coo','cfo','chair'];
  const junior = ['intern','analyst','coordinator','assistant','junior','associate analyst'];
  if (senior.some(s => t.includes(s))) return 'senior';
  if (junior.some(s => t.includes(s))) return 'junior';
  return 'mid';
}

function typePill(t) {
  const cls = {'VC':'vc','LP':'lp','Impact Investor':'impact','Investor':'investor','Founder/Operator':'founder','Policy/NGO':'policy','Consultant/Advisor':'consultant','Academic/Research':'academic','Unknown':'unknown'}[t]||'unknown';
  return `<span class="pill pill-${cls}">${t.replace(/\//g,'/ ')}</span>`;
}

let sortCol = null, sortDir = 1;

function render() {
  const q  = document.getElementById('search').value.toLowerCase();
  const tf = document.getElementById('typeFilter').value;
  const mf = document.getElementById('metFilter').value;

  let filtered = DATA.filter(a => {
    if (q && !a.name.toLowerCase().includes(q) && !(a.about||'').toLowerCase().includes(q)) return false;
    if (tf && a.type !== tf) return false;
    if (mf === 'met'  && !state[a.person_id].met)          return false;
    if (mf === 'skip' && !state[a.person_id].not_relevant) return false;
    return true;
  });

  if (sortCol) {
    filtered.sort((a,b) => {
      let av = a[sortCol]||'', bv = b[sortCol]||'';
      if (sortCol==='type') { av = TYPE_ORDER[av]??9; bv = TYPE_ORDER[bv]??9; return (av-bv)*sortDir; }
      return av.localeCompare(bv)*sortDir;
    });
  } else {
    filtered.sort((a,b) => (TYPE_ORDER[a.type]??9)-(TYPE_ORDER[b.type]??9) || a.name.localeCompare(b.name));
  }

  document.getElementById('countLabel').textContent = `${filtered.length} of ${DATA.length}`;

  const tbody = document.getElementById('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No attendees match your filters.</td></tr>`;
    document.getElementById('batchBtns').innerHTML = '';
    return;
  }

  tbody.innerHTML = filtered.map(a => {
    const photoSrc = `photos/${a.slug}.jpg`;
    const s = state[a.person_id];
    const rowCls    = s.not_relevant ? 'not-relevant-row' : '';
    const actionCls = s.met ? 'state-met' : s.not_relevant ? 'state-skip' : '';
    const actionLbl = s.met ? '✓' : s.not_relevant ? '✗' : '';

    const hasAbout = !!a.about;

    // Collapsed: 4-line clamped snippet + hint if long enough
    // Expanded: full bio (newlines → <br>) + notes
    let aboutContent;
    if (s.expanded) {
      aboutContent = `
        <div class="about-full">${hasAbout ? a.about.replace(/\n\n/g,'<br><br>') : '<span style="color:#b0bdb3">—</span>'}</div>
        <div class="notes-wrap">
          <div class="notes-label">Notes</div>
          <textarea class="notes-input" id="notes_${a.person_id}" placeholder="Add a note…"
            oninput="saveNotes('${a.person_id}')"
            onclick="event.stopPropagation()">${s.notes||''}</textarea>
        </div>`;
    } else {
      const longEnough = hasAbout && a.about.length > 180;
      aboutContent = `
        <div class="about-snippet">${hasAbout ? a.about : '<span style="color:#b0bdb3">—</span>'}</div>
        ${longEnough ? `<span class="expand-hint">↓ more</span>` : ''}`;
    }

    return `<tr class="main-row ${rowCls}">
      <td class="action-cell">
        <button class="action-btn ${actionCls}" onclick="cycleAction('${a.person_id}')" title="Cycle: unset → met → skip">${actionLbl}</button>
      </td>
      <td class="identity-cell">
        <div class="identity-inner">
          <img class="photo" src="${photoSrc}" alt="${a.name}" onerror="this.src='${mkSvg(a.name)}'">
          <div class="identity-text">
            <div class="name-line">
              ${liIcon(a.linkedin, a.status)}
              <span class="person-name">${a.name}</span>
            </div>
            ${a.company ? `<div class="company-line">${a.company_domain ? `<img class="company-logo" src="https://logo.clearbit.com/${a.company_domain}" onerror="this.style.display='none'">` : ''}<span>${a.company}</span></div>` : ''}
            ${a.title ? `<div class="title-line title-${titleLevel(a.title)}">${a.title}</div>` : ''}
          </div>
        </div>
      </td>
      <td class="type-cell">${typePill(a.type)}</td>
      <td class="about-cell" onclick="toggleExpand('${a.person_id}')">
        ${aboutContent}
      </td>
    </tr>`;
  }).join('');

  // Batch LinkedIn buttons
  const batchBtns = document.getElementById('batchBtns');
  const liUrls = filtered.filter(a => a.linkedin).map(a => a.linkedin);
  batchBtns.innerHTML = '';
  for (let i = 0; i < liUrls.length; i += 10) {
    const batch = liUrls.slice(i, i+10);
    const btn = document.createElement('button');
    btn.className = 'batch-btn';
    btn.textContent = `Open LinkedIn ${i+1}–${Math.min(i+10, liUrls.length)}`;
    btn.onclick = (function(urls) {
      return function() {
        const script = urls.map(u => `window.open(${JSON.stringify(u)},'_blank');`).join('');
        const page = `<html><body><script>window.onload=function(){${script}window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ${urls.length} tabs…</p></body></html>`;
        window.open(URL.createObjectURL(new Blob([page],{type:'text/html'})),'_blank');
      };
    })(batch);
    batchBtns.appendChild(btn);
  }
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('typeFilter').addEventListener('change', render);
document.getElementById('metFilter').addEventListener('change', render);

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    render();
  });
});

render();
</script>
</body>
</html>
