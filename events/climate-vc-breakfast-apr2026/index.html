      if (!hay.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a,b) => {
    let va, vb;
    if (sortKey==='name') { va=a.name; vb=b.name; }
    else if (sortKey==='type') {
      // Primary: type, secondary: status, tertiary: name
      const ta=TYPE_ORDER[a.type]??9, tb=TYPE_ORDER[b.type]??9;
      if (ta!==tb) return (ta-tb)*sortDir;
      const sa=STATUS_ORDER[a.status]??9, sb=STATUS_ORDER[b.status]??9;
      if (sa!==sb) return (sa-sb)*sortDir;
      return a.name.localeCompare(b.name)*sortDir;
    }
    else if (sortKey==='status') { va=STATUS_ORDER[a.status]??9; vb=STATUS_ORDER[b.status]??9; }
    else { va=a[sortKey]||''; vb=b[sortKey]||''; }
    if (typeof va==='string') return va.localeCompare(vb)*sortDir;
    return (va-vb)*sortDir;
  });

  document.getElementById('row-count').textContent = `${filtered.length} of ${ATTENDEES.length}`;

  const tbody = document.getElementById('tbody');
  const rows = [];
  filtered.forEach((a, i) => {
    if (i % 10 === 0) {
      const batchNum = Math.floor(i/10)+1;
      rows.push(`<tr class="batch-divider"><td colspan="6">Batch ${batchNum} · rows ${i+1}–${Math.min(i+10, filtered.length)}</td></tr>`);
    }
    const bio = [a.linkedin_para, a.web_para].filter(Boolean).join('\n\n');
    const short = truncate(bio);
    const hasMore = bio.length > 120;
    const photoSrc = `photos/${a.slug}.jpg`;

    rows.push(`<tr>
      <td class="photo-cell">
        <img class="photo" src="${photoSrc}" alt="${a.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="photo-placeholder" style="display:none">${initials(a.name)}</div>
      </td>
      <td class="li-cell${a.linkedin?'':' no-url'}">
        <a href="${a.linkedin||'#'}" target="_blank" rel="noopener" title="${a.name} on LinkedIn">
          ${liIcon(a.linkedin)}
        </a>
      </td>
      <td><span class="name">${a.name}</span></td>
      <td>${badgeType(a.type)}</td>
      <td>${badgeStatus(a.status)}</td>
      <td>
        <span class="bio-text">
          <span class="bio-short">${short}${hasMore?'…':''}</span>
          ${hasMore?`<span class="bio-full">${bio.replace(/\n\n/g,'<br><br>')}</span><span class="bio-toggle" onclick="toggleBio(this)">more</span>`:''}
        </span>
      </td>
    </tr>`);
  });
  tbody.innerHTML = rows.join('');
  renderBatchBtns();
}

function toggleBio(el) {
  const short = el.parentElement.querySelector('.bio-short');
  const full = el.parentElement.querySelector('.bio-full');
  const open = full.style.display==='block';
  short.style.display = open?'block':'none';
  full.style.display = open?'none':'block';
  el.textContent = open?'more':'less';
}

function sortBy(key) {
  if (sortKey===key) sortDir *= -1;
  else { sortKey=key; sortDir=1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  event.currentTarget.classList.add('sorted');
  render();
}

function renderBatchBtns() {
  const container = document.getElementById('batch-btns');
  const tip = document.getElementById('popup-tip');
  if (filtered.length===0) { container.innerHTML=''; tip.style.display='none'; return; }

  const batches = [];
  for (let i=0; i<filtered.length; i+=10) {
    batches.push(filtered.slice(i,i+10));
  }

  container.innerHTML = batches.map((batch, i) => {
    const urls = batch.map(a=>a.linkedin).filter(Boolean);
    return `<button class="batch-btn" onclick="openBatch(${JSON.stringify(urls)})">
      Open Batch ${i+1} (${batch.length} profiles)
    </button>`;
  }).join('');
  tip.style.display = 'block';
}

function openBatch(urls) {
  const script = urls.map(u=>`window.open(${JSON.stringify(u)},'_blank');`).join('');
  const html = `<html><body><script>window.onload=function(){${script}window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ${urls.length} LinkedIn tabs…</p></body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  window.open(URL.createObjectURL(blob),'_blank');
}

// Default sort: type → status → name
sortKey = 'type'; sortDir = 1;
render();
</script>
</body>
</html>
