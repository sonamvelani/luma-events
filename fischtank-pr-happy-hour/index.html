<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FischTank PR Happy Hour · Attendees</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; }

  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white; padding: 32px 40px; margin-bottom: 24px;
  }
  .header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 14px; opacity: 0.7; }

  .controls {
    background: white; border-radius: 12px; padding: 16px 20px;
    margin: 0 24px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .controls input, .controls select {
    border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 12px;
    font-size: 13px; outline: none; color: #333; transition: border-color 0.2s;
  }
  .controls input:focus, .controls select:focus { border-color: #0f3460; }
  .controls input { flex: 1; min-width: 200px; }
  .count-badge {
    margin-left: auto; background: #f0f4ff; color: #0f3460;
    border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600;
  }

  .batch-buttons {
    margin: 0 24px 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .batch-tip { font-size: 11px; color: #999; }
  .batch-btn {
    background: #0f3460; color: white; border: none; border-radius: 8px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  .batch-btn:hover { background: #1a5276; }

  .table-wrap { margin: 0 24px 40px; overflow-x: auto; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
  thead th {
    background: #f5f7ff; padding: 12px 16px; text-align: left;
    font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase;
    letter-spacing: 0.05em; cursor: pointer; user-select: none;
    border-bottom: 2px solid #e8ecff; white-space: nowrap;
  }
  thead th:hover { background: #eef0ff; }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  thead th.sorted .sort-arrow { opacity: 1; color: #0f3460; }
  tbody tr { border-bottom: 1px solid #f0f2f8; transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbff; }
  td { padding: 6px 12px; vertical-align: middle; font-size: 13px; }

  .batch-divider td {
    background: #f5f7ff; font-size: 11px; font-weight: 700;
    color: #888; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 6px 16px; border-bottom: 1px solid #e8ecff;
  }

  .td-photo { width: 60px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid #e8ecff; }

  .td-li { width: 36px; text-align: center; }
  .li-link { display: inline-flex; align-items: center; justify-content: center; }
  .li-link.grey { opacity: 0.15; cursor: default; pointer-events: none; }

  .td-name { min-width: 140px; }
  .name-text { font-weight: 600; color: #1a1a2e; }

  .td-title { min-width: 160px; color: #555; }

  .td-company { min-width: 180px; }
  .company-cell { display: flex; align-items: center; gap: 8px; }
  .company-logo {
    width: 28px; height: 28px; border-radius: 5px; object-fit: contain;
    border: 1px solid #eee; background: white; flex-shrink: 0;
  }
  .company-name { color: #333; font-weight: 500; }

  .td-about { min-width: 200px; max-width: 320px; color: #555; font-size: 12px; line-height: 1.4; }
  .about-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .td-status { width: 36px; text-align: center; }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
  .status-confirmed { background: #4caf50; }
  .status-guessed   { background: #ffc107; }
  .status-na        { background: #ccc; }

  @media (max-width: 600px) {
    .header { padding: 20px; }
    .controls, .table-wrap, .batch-buttons { margin: 0 12px 12px; }
  }
</style>

let sortCol = null, sortAsc = true;
let currentData = [...DATA];

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const fc = document.getElementById('filterCompany').value;
  const fs = document.getElementById('filterStatus').value;

  const filtered = currentData.filter(r => {
    const ok1 = !search || r[1].toLowerCase().includes(search) || r[2].toLowerCase().includes(search) || r[3].toLowerCase().includes(search);
    const ok2 = !fc || r[3] === fc;
    const ok3 = !fs || r[6] === fs;
    return ok1 && ok2 && ok3;
  });

  document.getElementById('countBadge').textContent = filtered.length + ' of ' + DATA.length;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  filtered.forEach((r, i) => {
    if (i % 10 === 0) {
      const d = tbody.insertRow(); d.className = 'batch-divider';
      d.insertCell().colSpan = 7;
      d.cells[0].textContent = 'Batch ' + (Math.floor(i/10)+1) + ' \u00B7 rows ' + (i+1) + '\u2013' + Math.min(i+10, filtered.length);
      d.cells[0].colSpan = 7;
    }
    const tr = tbody.insertRow();
    const logo = r[4] ? 'https://www.google.com/s2/favicons?domain=' + r[4] + '&sz=64' : null;
    const sd = r[6] === 'Confirmed' ? 'status-confirmed' : r[6] === 'Guessed' ? 'status-guessed' : 'status-na';
    const about = r[7] || '';
    const aboutHtml = about ? '<div class="about-text" title="' + about.replace(/"/g,'&quot;') + '">' + about + '</div>' : '<span style="color:#ccc">\u2014</span>';
    tr.innerHTML =
      '<td class="td-photo"><img class="avatar" src="' + r[0] + '" alt="' + r[1] + '" onerror="this.src=\'https://cdn.lu.ma/avatars-default/avatar_0.png\'"></td>' +
      '<td class="td-li">' + (r[5] ? '<a class="li-link" href="' + r[5] + '" target="_blank" rel="noopener">' + LI_SVG + '</a>' : '<span class="li-link grey">' + LI_SVG + '</span>') + '</td>' +
      '<td><span class="name-text">' + r[1] + '</span></td>' +
      '<td class="td-title">' + (r[2] || '<span style="color:#ccc">\u2014</span>') + '</td>' +
      '<td class="td-company"><div class="company-cell">' +
        (logo ? '<img class="company-logo" src="' + logo + '" alt="" onerror="this.style.display=\'none\'" loading="lazy">' : '') +
        '<span class="company-name">' + (r[3] || '<span style="color:#ccc">\u2014</span>') + '</span>' +
      '</div></td>' +
      '<td class="td-about">' + aboutHtml + '</td>' +
      '<td class="td-status"><span class="status-dot ' + sd + '" title="' + r[6] + '"></span></td>';
  });

  updateBatchBtns(filtered);
}

function updateBatchBtns(filtered) {
  const urls = filtered.filter(r => r[5]).map(r => r[5]);
  const wrap = document.getElementById('batchButtons');
  wrap.innerHTML = '<span class="batch-tip">Open LinkedIn in batch (allow popups for launcher tab):</span>';
  for (let i = 0; i < urls.length; i += 10) {
    const chunk = urls.slice(i, i+10);
    const btn = document.createElement('button');
    btn.className = 'batch-btn';
    btn.textContent = 'Batch ' + (Math.floor(i/10)+1) + ' (' + chunk.length + ')';
    btn.onclick = (function(u) { return function() {
      const s = u.map(x => 'window.open(' + JSON.stringify(x) + ',"_blank");').join('');
      const p = '<html><body><script>window.onload=function(){' + s + 'window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ' + u.length + ' tabs\u2026</p></body></html>';
      window.open(URL.createObjectURL(new Blob([p], {type:'text/html'})), '_blank');
    }; })(chunk);
    wrap.appendChild(btn);
  }
}

function sortBy(col) {
  const idx = {name:1, title:2, company:3, about:7, status:6};
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  const i = idx[col];
  currentData.sort((a, b) => {
    const av = (a[i]||'').toLowerCase(), bv = (b[i]||'').toLowerCase();
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    const sa = th.querySelector('.sort-arrow');
    if (sa) sa.innerHTML = '&#8597;';
  });
  const cols = [null, null, 'name', 'title', 'company', 'status'];
  document.querySelectorAll('thead th').forEach((th, i) => {
    if (cols[i] === col) {
      th.classList.add('sorted');
      const sa = th.querySelector('.sort-arrow');
      if (sa) sa.innerHTML = sortAsc ? '&#8593;' : '&#8595;';
    }
  });
  renderTable();
}

(function populateFilters() {
  const companies = [...new Set(DATA.map(r => r[3]).filter(Boolean))].sort();
  const sel = document.getElementById('filterCompany');
  companies.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; sel.appendChild(o); });
})();

document.getElementById('search').addEventListener('input', renderTable);
document.getElementById('filterCompany').addEventListener('change', renderTable);
document.getElementById('filterStatus').addEventListener('change', renderTable);

renderTable();
